name: ML Gatekeeper 

on:
  push:
    branches:
      - "**"

jobs:

  linter:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run linter
        run: |
          echo "Running linter..."
          # Example: simulate pass
          exit 0


  train:
    runs-on: ubuntu-latest
    needs: linter

    if: needs.linter.result == 'success' &&
        github.ref == 'refs/heads/main' &&
        contains(github.event.head_commit.message, '[run-train]')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Training (simulate GPU job)
        run: |
          echo "Training model..."
          # simulate failure for testing
          exit 1

      #failure
      - name: Save error logs
        if: failure()
        run: |
          echo "Training failed!" > error_logs.txt
          echo "Check logs for debugging." >> error_logs.txt

      - name: Upload error logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-logs
          path: error_logs.txt

      #Always
      - name: Cleanup resources
        if: always()
        run: |
          echo "Cleaning up temporary cloud volumes..."